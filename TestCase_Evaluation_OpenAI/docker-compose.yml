# ─────────────────────────────────────────────────────────────
# CEV Rules Test Portal — docker-compose.yml
#
# Usage:
#   Start:   docker-compose up --build
#   Stop:    docker-compose down
#   Logs:    docker-compose logs -f
#   Rebuild: docker-compose up --build --force-recreate
# ─────────────────────────────────────────────────────────────

services:
  portal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cev-test-portal

    # Load environment variables from .env file
    # All secrets stay in .env — never baked into the image
    env_file:
      - .env

    ports:
      - "8000:8000"

    volumes:
      # Persist FAISS indices and Excel reports across container restarts
      - portal_faiss:/app/data/faiss_store
      - portal_outputs:/app/outputs

    restart: unless-stopped

    # Resource limits — suitable for free-tier hosting
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/config')"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

# Named volumes — data persists even when container is recreated
volumes:
  portal_faiss:
    driver: local
  portal_outputs:
    driver: local
